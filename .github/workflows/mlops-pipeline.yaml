name: MLOPs CI Pipeline

on:
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run all jobs"
        required: false
        default: "true"
      run_data_processing:
        description: "Run data processing job"
        required: false
        default: "false"
      run_model_training:
        description: "Run model training job"
        required: false
        default: "false"
      run_build_and_publish:
        description: "Run build and publish job"
        required: false
        default: "false"
  release:
    types: [created]
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  data-processing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Actions (we may look more on github.com/marketplace) for other actions

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.19" # specify the Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Processing
        run: |
          python src/data/processor.py \ 
            --input data/raw/AB_NYC_2019.csv \
            --output data/processed/AB_NYC_2019_quality_assessed.csv

      - name: Run Feature Engineering
        run: |
          python src/features/engineer.py \
            --input data/processed/AB_NYC_2019_quality_assessed.csv \
            --output data/processed/AB_NYC_2019_feature_engineered.csv \
            --preprocessor models/trained/preprocessor.pkl

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/AB_NYC_2019_feature_engineered.csv

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: preprocessor
          path: models/trained/preprocessor.pkl

  model-training:
    needs: data-processing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Actions (we may look more on github.com/marketplace) for other actions

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.19" # specify the Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download processed data
      - uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Setup MLFow
        run: |
          docker pull ghrc.io/mlflow/mlflow:latest
          docker run -d -p 5001:5000 -name mlfow-server ghrc.io/mlflow/mlflow:latest \
            mlflow server --backend-store-uri sqlite:///mlflow.db \ 
            --default-artifact-root ./mlruns \
            --host 0.0.0.0 --port 5001

      - name: Wait for MLflow to start
        run: |
          for i in {1..10}; do
            curl -f http://localhost:5001/health || sleep 5;
          done

      - name: Run Model Training
        run: |
          mkdir -p models
          python src/models/train_model.py \
          --config configs/model_config.yaml \ 
          --data data/processed/AB_NYC_2019_feature_engineered.csv \
          --models-dir models \   
          --mlflow-tracking-uri http://localhost:5001

      - name: Cleaning up MLFlow
        run: |
          docker stop mlflow-server
          docker rm mlflow-server
          docker rmi ghrc.io/mlflow/mlflow:latest

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: actions/upload-artifact@v4
          path: models/

  run-build-and-publish:
    needs: model-training
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Actions (we may look more on github.com/marketplace) for other actions

      - name: Download trained model
      - uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/trained/

      - name: Download preprocessor
      - uses: actions/download-artifact@v4
        with:
          name: preprocessor
          path: models/trained/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test Docker Image
        run: |
          COMMIT_HASH=$(ECHO ${{ github.sha }} | -c1-7)
          docker build -t docker.io/${{ vars.DOCKERHUB_USERNAME }}/Airbnb_price_model:$COMMIT_HASH -F dockerfile
          docker run -d -p 8000:8000 --name app docker docker.io/${{ DOCKERHUB_USERNAME }}/ Airbnb_price_model:$COMMIT_HASH
          for i in {1..10}d; do
            curl -f http://localhost:8000/health && break || sleep 5;
          done
          docker logs app

      - name: Clean up Test Container
        run: |
          docker stop app || true
          docker rm app || true

      - name: Log in to DockerHub Container Resgistry
        used: docker/login-action@v4
        with:
          resgistry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image to DockerHub
        run: |
          COMMIT_HASH=$(ECHO ${{ github.sha }} | -c1-7)
          docker tag docker.io/${{ vars.DOCKERHUB_USERNAME }}/Airbnb_price_model:$COMMIT_HASH docker.io/${{ vars.DOCKERHUB_USERNAME }}
          docker push docker.io/${{ vars.DOCKERHUB_USERNAME }}/ Airbnb_price_model:$COMMIT_HASH
          docker push docker.io/${{ vars.DOCKERHUB_USERNAME }}/ Airbnb_price_model:latest
